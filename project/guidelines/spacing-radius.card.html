<!-- @dsCard group="Spacing" viewport="700x150" name="Corner radius" subtitle="sm 10px (controls) · default 16px (cards) · pill 999px (badges)" -->
<!DOCTYPE html>
<html data-tp-theme="light">
<head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--tp-bg);font-family:var(--tp-font-sans);padding:20px;}
  .row{display:flex;gap:20px;align-items:center;}
  .box{background:var(--tp-primary-soft);border:1.5px solid var(--tp-primary);height:70px;width:110px;display:flex;align-items:center;justify-content:center;font-family:var(--tp-font-mono);font-size:11px;color:var(--tp-primary);}
</style></head>
<body>
  <div class="row">
    <div class="box" style="border-radius:var(--tp-radius-sm)">sm 10px</div>
    <div class="box" style="border-radius:var(--tp-radius)">default 16px</div>
    <div class="box" style="border-radius:var(--tp-radius-pill);width:140px">pill 999px</div>
  </div>
</body></html>
