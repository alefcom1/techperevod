<!DOCTYPE html>
<html data-tp-theme="light">
<head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--tp-bg);font-family:var(--tp-font-sans);padding:20px;color:var(--tp-text);}
  .row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
  .chip{padding:8px 16px;border:1px solid var(--tp-border);border-radius:var(--tp-radius-sm);background:var(--tp-surface);font-family:var(--tp-font-mono);font-size:14px;}
  .term{font-family:var(--tp-font-mono);font-size:15px;color:var(--tp-text);}
  .term b{color:var(--tp-primary);}
</style></head>
<body>
  <div class="row">
    <div class="chip">DOCX</div><div class="chip">PDF</div><div class="chip">XLIFF</div><div class="chip">JSON</div><div class="chip">DWG</div>
  </div>
  <div class="term"><b>привод</b> → actuator · RU→EN</div>
</body></html>
