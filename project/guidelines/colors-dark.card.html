<!-- @dsCard group="Colors" viewport="700x150" name="Dark theme" subtitle="Same tokens, [data-tp-theme=dark] scope" -->
<!DOCTYPE html>
<html>
<head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;font-family:var(--tp-font-sans);}
  .panel{background:var(--tp-bg);padding:20px;}
  .row{display:flex;gap:12px;}
  .sw{flex:1;height:90px;border-radius:var(--tp-radius-sm);display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;border:1px solid var(--tp-border);font-size:12px;color:var(--tp-text);}
  .sw span{display:block;font-family:var(--tp-font-mono);font-size:11px;color:var(--tp-text-muted);}
</style></head>
<body>
  <div class="panel" data-tp-theme="dark">
    <div class="row">
      <div class="sw" style="background:var(--tp-bg)">bg<span>--tp-bg</span></div>
      <div class="sw" style="background:var(--tp-surface)">surface<span>--tp-surface</span></div>
      <div class="sw" style="background:var(--tp-surface-elevated)">elevated<span>--tp-surface-elevated</span></div>
      <div class="sw" style="background:var(--tp-primary);color:#fff">primary<span style="color:#dbe4ff">--tp-primary</span></div>
      <div class="sw" style="background:var(--tp-accent);color:#03251f">accent<span style="color:#04382f">--tp-accent</span></div>
    </div>
  </div>
</body></html>
