<!-- @dsCard group="Colors" viewport="700x150" name="Primary & Accent" subtitle="Electric blue (western/brand) + turquoise (AI/local)" -->
<!DOCTYPE html>
<html data-tp-theme="light">
<head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--tp-bg);font-family:var(--tp-font-sans);}
  .row{display:flex;gap:16px;padding:20px;}
  .sw{flex:1;height:90px;border-radius:var(--tp-radius-sm);display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;color:#fff;font-size:13px;}
  .sw span{display:block;font-family:var(--tp-font-mono);font-size:12px;opacity:.85;}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--tp-primary)">Primary<span>--tp-primary #1B4DFF</span></div>
    <div class="sw" style="background:var(--tp-primary-hover)">Hover<span>--tp-primary-hover</span></div>
    <div class="sw" style="background:var(--tp-accent)">Accent<span>--tp-accent #00C4A7</span></div>
    <div class="sw" style="background:var(--tp-accent-hover)">Hover<span>--tp-accent-hover</span></div>
  </div>
</body></html>
