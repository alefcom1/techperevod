<!-- @dsCard group="Spacing" viewport="700x220" name="Spacing scale" subtitle="4px base unit — --tp-space-1 … --tp-space-13" -->
<!DOCTYPE html>
<html data-tp-theme="light">
<head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--tp-bg);font-family:var(--tp-font-mono);font-size:11px;color:var(--tp-text-muted);padding:20px;}
  .row{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .bar{background:var(--tp-primary);height:14px;border-radius:2px;}
  .label{width:150px;}
</style></head>
<body>
  <div class="row"><span class="label">--tp-space-1 (4px)</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="label">--tp-space-3 (12px)</span><div class="bar" style="width:12px"></div></div>
  <div class="row"><span class="label">--tp-space-6 (24px, base)</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="label">--tp-space-8 (40px)</span><div class="bar" style="width:40px"></div></div>
  <div class="row"><span class="label">--tp-space-10 (64px)</span><div class="bar" style="width:64px"></div></div>
  <div class="row"><span class="label">--tp-space-12 (96px)</span><div class="bar" style="width:96px"></div></div>
  <div class="row"><span class="label">--tp-space-13 (128px)</span><div class="bar" style="width:128px"></div></div>
</body></html>
