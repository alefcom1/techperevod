<!-- @dsCard group="Colors" viewport="700x150" name="Interactive states" subtitle="Soft / hover / active derived via color-mix()" -->
<!DOCTYPE html>
<html data-tp-theme="light">
<head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--tp-bg);font-family:var(--tp-font-sans);}
  .row{display:flex;gap:10px;padding:20px;}
  .chip{flex:1;height:80px;border-radius:var(--tp-radius-sm);display:flex;align-items:center;justify-content:center;font-size:12px;font-family:var(--tp-font-mono);}
</style></head>
<body>
  <div class="row">
    <div class="chip" style="background:var(--tp-primary-soft);color:var(--tp-primary)">primary-soft</div>
    <div class="chip" style="background:var(--tp-primary);color:#fff">primary</div>
    <div class="chip" style="background:var(--tp-primary-hover);color:#fff">primary-hover</div>
    <div class="chip" style="background:var(--tp-primary-active);color:#fff">primary-active</div>
    <div class="chip" style="background:var(--tp-accent-soft);color:color-mix(in oklch,var(--tp-accent) 55%,black)">accent-soft</div>
    <div class="chip" style="background:var(--tp-accent);color:#fff">accent</div>
    <div class="chip" style="background:var(--tp-accent-hover);color:#fff">accent-hover</div>
  </div>
</body></html>
