<!DOCTYPE html>
<html data-tp-theme="light">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--tp-bg); font-family: var(--tp-font-sans); }
  .wrap { padding: 20px; display: flex; flex-direction: column; gap: 28px; }
  .row3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .row4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .rowstat { display: flex; gap: 40px; justify-content: center; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { PricingCard, Badge, IndustryCard, StatMetric, StepFlow, Icon } = window.TechperevodDesignSystem_4028dd;

function Demo() {
  return (
    <div className="wrap">
      <div className="row3">
        <PricingCard name="Full" description="Перевод + редактура инженером. Максимальное качество." features={["Инженер-редактор", "Термбаза клиента", "Срок: 2–4 дня"]} />
        <PricingCard name="MTPE" featured badge={<Badge tone="accent">Популярный</Badge>} description="AI-черновик + доводка человеком. Быстрее и дешевле." features={["AI-оркестрация", "Правка инженером", "Срок: 1–2 дня"]} />
        <PricingCard name="Express" description="Срочная сдача, приоритетная очередь." features={["Приоритетная очередь", "Срок: до 24ч"]} />
      </div>
      <div className="row4">
        <IndustryCard icon={<Icon name="cpu" color="var(--tp-primary)" />} name="IT и SaaS" />
        <IndustryCard icon={<Icon name="flame" color="var(--tp-primary)" />} name="Нефтегаз" />
        <IndustryCard icon={<Icon name="cog" color="var(--tp-primary)" />} name="Машиностроение" />
        <IndustryCard icon={<Icon name="pill" color="var(--tp-primary)" />} name="Медтех и фарма" />
      </div>
      <div className="rowstat">
        <StatMetric value="40 млн+" label="слов переведено" />
        <StatMetric value="35%" label="экономии по TM" />
        <StatMetric value="2 мин" label="среднее время оценки" />
      </div>
      <StepFlow steps={[{title:'Загрузка'},{title:'AI-оркестрация'},{title:'Редактор-инженер'},{title:'Сдача'}]} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
