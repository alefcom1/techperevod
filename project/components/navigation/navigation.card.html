<!DOCTYPE html>
<html data-tp-theme="light">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--tp-bg); font-family: var(--tp-font-sans); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { NavBar, Footer, ThemeToggle, Button, BrandMark } = window.TechperevodDesignSystem_4028dd;
function Demo() {
  const [theme, setTheme] = React.useState('light');
  React.useEffect(() => { document.documentElement.setAttribute('data-tp-theme', theme); }, [theme]);
  return (
    <div>
      <NavBar
        logo={<BrandMark theme={theme} basePath="../../" height={28} tagline={false} />}
        links={[{label:'Тарифы'},{label:'Отрасли'},{label:'B2B'}]}
        right={<ThemeToggle theme={theme} onChange={setTheme} />}
        cta={<Button size="sm">Загрузить документ</Button>}
      />
      <Footer
        logo={<BrandMark theme={theme} basePath="../../" height={40} />}
        columns={[
          {title:'Услуги', links:[{label:'Full'},{label:'MTPE'},{label:'Express'}]},
          {title:'Отрасли', links:[{label:'IT и SaaS'},{label:'Нефтегаз'}]},
          {title:'Платформа', links:[{label:'AI-оркестратор'},{label:'Термбаза'}]},
        ]}
        bottom="© 2026 techperevod"
      />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
