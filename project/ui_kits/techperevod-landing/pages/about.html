<!DOCTYPE html>
<html lang="ru" data-tp-theme="light">
<head>
<meta charset="utf-8" />
<title>О нас | techperevod.com</title>
<link rel="icon" type="image/png" sizes="32x32" href="../../../assets/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="../../../assets/favicon-16.png" />
<link rel="icon" type="image/png" sizes="192x192" href="../../../assets/favicon-192.png" />
<link rel="apple-touch-icon" href="../../../assets/apple-touch-icon.png" />
<link rel="stylesheet" href="../../../styles.css" />
<link rel="stylesheet" href="../landing.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="../shared/PageShell.jsx"></script>
<script type="text/babel" src="../shared/PageHero.jsx"></script>
<script type="text/babel">
const { SectionHeader, Card, Icon, StatMetric, Button, ScrollReveal } = window.TechperevodDesignSystem_4028dd;

const VALUES = [
  { icon: "gauge", title: "Скорость AI", desc: "AI-оркестратор возвращает черновик за минуты, а не дни." },
  { icon: "user-check", title: "Точность инженера", desc: "Каждый заказ проверяет редактор с профильным образованием." },
  { icon: "database", title: "Прозрачная термбаза", desc: "Глоссарий и память переводов принадлежат клиенту, а не нам." },
  { icon: "globe", title: "Оба контура моделей", desc: "Западные и локальные модели — легально, в одном процессе." },
];

function AboutPage({ root }) {
  return (
    <React.Fragment>
      <PageHero
        breadcrumb={<span><a href={root + "index.html"}>Главная</a> / О нас</span>}
        title="Скорость AI, точность инженера"
        subtitle="techperevod — платформа технического перевода для инженерных, IT- и промышленных компаний. Мы соединяем AI-оркестрацию моделей с редактурой инженеров-переводчиков."
        ctaHref={root + "index.html#hero"}
      />

      <section className="tp-section" data-screen-label="about">
        <div className="tp-section__inner">
          <ScrollReveal><SectionHeader title="Чем мы отличаемся" /></ScrollReveal>
          <div className="tp-values-grid">
            {VALUES.map((v, i) => (
              <ScrollReveal key={v.title} delay={i * 70}>
                <Card padding="lg" className="tp-value-card">
                  <div className="tp-value-card__icon"><Icon name={v.icon} size={22} /></div>
                  <div className="tp-value-card__title">{v.title}</div>
                  <p className="tp-value-card__desc">{v.desc}</p>
                </Card>
              </ScrollReveal>
            ))}
          </div>
        </div>
      </section>

      <section className="tp-section tp-section--tint">
        <div className="tp-section__inner">
          <ScrollReveal>
            <div className="tp-about-stats">
              <StatMetric value="40 млн+" label="слов переведено" />
              <StatMetric value="65+" label="поддерживаемых форматов" />
              <StatMetric value="4" label="отрасли специализации" />
            </div>
          </ScrollReveal>
          <p style={{ textAlign: "center", color: "var(--tp-text-muted)", fontSize: 13, marginTop: 16 }}>
            * иллюстративные показатели — заменить реальными данными
          </p>
        </div>
      </section>

      <section className="tp-section">
        <div className="tp-section__inner">
          <ScrollReveal>
            <Card variant="glass" className="tp-about-cta">
              <div>
                <div className="tp-value-card__title" style={{ fontSize: 22, marginBottom: 8 }}>Готовы обсудить проект?</div>
                <p className="tp-value-card__desc">Расскажите, что нужно перевести — пришлём оценку в течение рабочего дня.</p>
              </div>
              <Button size="lg" variant="primary" as="a" href={root + "pages/contacts.html"}>
                Связаться с нами
              </Button>
            </Card>
          </ScrollReveal>
        </div>
      </section>
    </React.Fragment>
  );
}

function App() {
  const [theme, setTheme] = React.useState(() => localStorage.getItem("tp-landing-theme") || "light");
  React.useEffect(() => {
    document.documentElement.setAttribute("data-tp-theme", theme);
    localStorage.setItem("tp-landing-theme", theme);
  }, [theme]);
  return (
    <PageShell theme={theme} setTheme={setTheme} root="../" assetsRoot="../../../">
      <AboutPage root="../" />
    </PageShell>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
