<!DOCTYPE html>
<html lang="ru" data-tp-theme="light">
<head>
<meta charset="utf-8" />
<title>Контакты | techperevod.com</title>
<link rel="icon" type="image/png" sizes="32x32" href="../../../assets/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="../../../assets/favicon-16.png" />
<link rel="icon" type="image/png" sizes="192x192" href="../../../assets/favicon-192.png" />
<link rel="apple-touch-icon" href="../../../assets/apple-touch-icon.png" />
<link rel="stylesheet" href="../../../styles.css" />
<link rel="stylesheet" href="../landing.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="../shared/PageShell.jsx"></script>
<script type="text/babel" src="../shared/PageHero.jsx"></script>
<script type="text/babel">
const { SectionHeader, Card, Input, FileDropzone, Button, Icon, ScrollReveal } = window.TechperevodDesignSystem_4028dd;

const CONTACT_METHODS = [
  { icon: "mail", label: "Email", value: "hello@techperevod.com" },
  { icon: "phone", label: "Телефон", value: "+7 495 000-00-00" },
  { icon: "send", label: "Telegram", value: "@techperevod" },
  { icon: "map-pin", label: "Офис", value: "Москва" },
];

function ContactsPage({ root }) {
  const [sent, setSent] = React.useState(false);
  return (
    <React.Fragment>
      <PageHero
        breadcrumb={<span><a href={root + "index.html"}>Главная</a> / Контакты</span>}
        title="Контакты"
        subtitle="Ответим в течение рабочего дня. Для срочной оценки — прикрепите документ ниже."
        ctaHref={root + "index.html#hero"}
      />

      <section className="tp-section" data-screen-label="contacts">
        <div className="tp-section__inner">
          <div className="tp-contact-grid">
            {CONTACT_METHODS.map((m, i) => (
              <ScrollReveal key={m.label} delay={i * 70}>
                <Card padding="lg" className="tp-contact-card">
                  <div className="tp-contact-card__icon"><Icon name={m.icon} size={22} /></div>
                  <div>
                    <div className="tp-contact-card__label">{m.label}</div>
                    <div className="tp-contact-card__value">{m.value}</div>
                  </div>
                </Card>
              </ScrollReveal>
            ))}
          </div>
        </div>
      </section>

      <section className="tp-section tp-section--tint">
        <div className="tp-section__inner">
          <ScrollReveal><SectionHeader title="Оставить заявку" subtitle="Заполните форму — мы свяжемся с вами и пришлём оценку стоимости." /></ScrollReveal>
          <ScrollReveal delay={80}>
            {sent ? (
              <Card variant="elevated" padding="lg" style={{ maxWidth: 640, margin: "0 auto", textAlign: "center" }}>
                <Icon name="shield-check" color="var(--tp-accent)" size={32} />
                <p style={{ marginTop: 16, color: "var(--tp-text)" }}>Заявка отправлена. Мы ответим в течение рабочего дня.</p>
              </Card>
            ) : (
              <form
                className="tp-contact-form"
                onSubmit={(e) => {
                  e.preventDefault();
                  setSent(true);
                }}
              >
                <div className="tp-contact-form__row">
                  <Input label="Имя" placeholder="Иван Иванов" required />
                  <Input label="Email" type="email" placeholder="you@company.ru" required />
                </div>
                <div className="tp-contact-form__row">
                  <Input label="Компания" placeholder="ООО «Ромашка»" />
                  <Input label="Языковая пара" mono placeholder="RU→EN" />
                </div>
                <Input label="Комментарий" placeholder="Кратко опишите задачу" />
                <FileDropzone hint="DOCX, PDF, XLIFF, JSON — необязательно" />
                <Button type="submit" size="lg" variant="primary" fullWidth>
                  Отправить заявку
                </Button>
              </form>
            )}
          </ScrollReveal>
        </div>
      </section>
    </React.Fragment>
  );
}

function App() {
  const [theme, setTheme] = React.useState(() => localStorage.getItem("tp-landing-theme") || "light");
  React.useEffect(() => {
    document.documentElement.setAttribute("data-tp-theme", theme);
    localStorage.setItem("tp-landing-theme", theme);
  }, [theme]);
  return (
    <PageShell theme={theme} setTheme={setTheme} root="../" assetsRoot="../../../">
      <ContactsPage root="../" />
    </PageShell>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
